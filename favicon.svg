<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0891B2"/>
    </linearGradient>
    <linearGradient id="grd2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#22D3EE"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="8" fill="url(#bg)"/>
  <!-- Router body -->
  <rect x="4" y="14" width="24" height="12" rx="3.5" fill="#0F172A" opacity="0.85"/>
  <rect x="4" y="14" width="24" height="12" rx="3.5" fill="url(#grd2)" opacity="0.15"/>
  <rect x="4.5" y="14.5" width="23" height="11" rx="3" fill="none" stroke="url(#grd2)" stroke-width="0.8" opacity="0.7"/>
  <!-- Status lights -->
  <circle cx="8.5" cy="20" r="1.8" fill="#22C55E" filter="url(#glow)"/>
  <circle cx="13" cy="20" r="1.4" fill="#3B82F6" opacity="0.9"/>
  <circle cx="17" cy="20" r="1.4" fill="#3B82F6" opacity="0.9"/>
  <!-- Port area -->
  <rect x="21" y="18.5" width="4.5" height="3" rx="1" fill="#334155" opacity="0.9"/>
  <rect x="21.4" y="19" width="1.4" height="2" rx="0.5" fill="#64748B"/>
  <rect x="23.2" y="19" width="1.4" height="2" rx="0.5" fill="#64748B"/>
  <!-- Left antenna -->
  <line x1="10" y1="14" x2="7.5" y2="5.5" stroke="url(#grd2)" stroke-width="2" stroke-linecap="round"/>
  <!-- Right antenna -->
  <line x1="22" y1="14" x2="24.5" y2="5.5" stroke="url(#grd2)" stroke-width="2" stroke-linecap="round"/>
  <!-- Wifi arcs -->
  <path d="M12.5 10 Q16 7 19.5 10" fill="none" stroke="#7DD3FC" stroke-width="1.8" stroke-linecap="round" opacity="0.85" filter="url(#glow)"/>
  <path d="M14.5 8 Q16 6.5 17.5 8" fill="none" stroke="#BAE6FD" stroke-width="1.5" stroke-linecap="round" opacity="0.7"/>
  <!-- VPN lock icon -->
  <rect x="14.5" y="21" width="3" height="2.5" rx="0.7" fill="#22D3EE" opacity="0.9"/>
  <path d="M15.2 21 L15.2 20.3 Q15.2 19.5 16 19.5 Q16.8 19.5 16.8 20.3 L16.8 21" fill="none" stroke="#22D3EE" stroke-width="1" stroke-linecap="round" opacity="0.9"/>
</svg>
